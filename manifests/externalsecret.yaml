## ──────────────────────────────────────────────
## ExternalSecret: Analytics service config
## Source: togglemaster/evaluation-service (AWS Secrets Manager)
## Creates K8s Secret: analytics-service-config
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: analytics-service-config
  namespace: togglemaster-analytics
  labels:
    app.kubernetes.io/name: analytics-service
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: togglemaster
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: analytics-service-config
    creationPolicy: Owner
  data:
    - secretKey: SQS_QUEUE_URL
      remoteRef:
        key: togglemaster/evaluation-service
        property: SQS_QUEUE_URL
    - secretKey: DYNAMODB_TABLE
      remoteRef:
        key: togglemaster/evaluation-service
        property: DYNAMODB_TABLE